<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me — Zhian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f9f5;
            color: #2d3a2d;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }
        
        .back-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: #2d6a4f;
            cursor: pointer;
            padding: 10px 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        
        .back-btn:active {
            opacity: 0.6;
        }
        
        .page-title {
            font-size: 28px;
            color: #2d6a4f;
            margin-bottom: 8px;
        }
        
        .page-subtitle {
            font-size: 14px;
            color: #6b7f6b;
            margin-bottom: 24px;
        }
        
        .contact-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 10px rgba(45, 106, 79, 0.08);
        }
        
        .contact-card label {
            display: block;
            font-size: 14px;
            color: #2d6a4f;
            font-weight: 600;
            margin-bottom: 6px;
            margin-top: 16px;
        }
        
        .contact-card label:first-child {
            margin-top: 0;
        }
        
        .contact-card input,
        .contact-card textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #d4e8d4;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            background: #fafff8;
            color: #2d3a2d;
            transition: border 0.2s;
        }
        
        .contact-card input:focus,
        .contact-card textarea:focus {
            outline: none;
            border-color: #2d6a4f;
        }
        
        .contact-card textarea {
            height: 120px;
            resize: vertical;
        }
        
        .send-btn {
            width: 100%;
            padding: 14px;
            background: #2d6a4f;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            font-family: inherit;
        }
        
        .send-btn:active {
            background: #1b4332;
        }
        
        .success-msg {
            display: none;
            text-align: center;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 12px;
            color: #2d6a4f;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Back Button -->
        <a href="index.html" class="back-btn">← Back</a>
        
        <h2 class="page-title">💬 Contact Me</h2>
        <p class="page-subtitle">I'd love to hear from you. Send me a message anytime.</p>
        
        <!-- Contact Form -->
        <div class="contact-card" id="contactForm">
            <form action="https://formsubmit.co/7ches5splayer83@gmail.com" method="POST">
                
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_template" value="box">
                <input type="hidden" name="_next" value="false">
                
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
                
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
                
                <label for="message">Your Message</label>
                <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
                
                <button type="submit" class="send-btn">Send Message ✉️</button>
                
            </form>
        </div>
        
    </div>

</body>
</html>
