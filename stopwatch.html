<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch — Zhian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f9f5;
            color: #2d3a2d;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            padding-bottom: 30px;
        }
        
        .back-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: #2d6a4f;
            cursor: pointer;
            padding: 10px 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        
        .back-btn:active {
            opacity: 0.6;
        }
        
        .page-title {
            font-size: 28px;
            color: #2d6a4f;
            margin-bottom: 8px;
        }
        
        .page-subtitle {
            font-size: 14px;
            color: #6b7f6b;
            margin-bottom: 20px;
        }
        
        /* Add Button */
        .add-btn {
            width: 100%;
            padding: 14px;
            background: white;
            color: #2d6a4f;
            border: 2px dashed #52b788;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        
        .add-btn:active {
            background: #e8f5e9;
        }
        
        /* Stopwatch Cards */
        .stopwatch-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .stopwatch-card {
            background: white;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(45, 106, 79, 0.06);
            transition: border 0.2s;
            border: 2px solid transparent;
        }
        
        .stopwatch-card.running {
            border-color: #52b788;
            background: #fafff6;
        }
        
        .stopwatch-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .stopwatch-name {
            flex-grow: 1;
            font-size: 16px;
            font-weight: 700;
            color: #2d6a4f;
            border: none;
            background: transparent;
            padding: 4px 0;
            outline: none;
            border-bottom: 2px solid transparent;
            transition: border 0.2s;
        }
        
        .stopwatch-name:focus {
            border-bottom-color: #52b788;
        }
        
        .stopwatch-name::placeholder {
            color: #a0b8a0;
            font-weight: 400;
        }
        
        .delete-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            color: #c0c0c0;
            transition: all 0.2s;
        }
        
        .delete-btn:active {
            background: #ffeaea;
            color: #e74c3c;
        }
        
        .time-display {
            font-size: 36px;
            font-weight: 300;
            color: #2d3a2d;
            text-align: center;
            margin: 10px 0 14px;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
        }
        
        .running .time-display {
            color: #2d6a4f;
            font-weight: 400;
        }
        
        .controls {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        
        .ctrl-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        
        .ctrl-btn:active {
            transform: scale(0.96);
        }
        
        .btn-start {
            background: #2d6a4f;
            color: white;
        }
        
        .btn-pause {
            background: #f0c040;
            color: #2d3a2d;
        }
        
        .btn-reset {
            background: #e8e8e8;
            color: #555;
        }
        
        /* Total Bar */
        .total-bar {
            margin-top: 24px;
            background: #2d6a4f;
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            color: white;
            position: sticky;
            bottom: 10px;
        }
        
        .total-bar .total-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-bottom: 4px;
        }
        
        .total-bar .total-time {
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
        }
        
        .empty-state {
            text-align: center;
            color: #a0b8a0;
            padding: 40px 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Back Button -->
        <a href="index.html" class="back-btn">← Back</a>
        
        <h2 class="page-title">⏲️ Stopwatch</h2>
        <p class="page-subtitle">Track time for each activity. Only one runs at a time.</p>
        
        <!-- Add Button -->
        <button class="add-btn" onclick="addStopwatch()">➕ Add New Stopwatch</button>
        
        <!-- Stopwatch List -->
        <div class="stopwatch-list" id="stopwatchList">
            <!-- Stopwatches appear here -->
        </div>
        
        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
            No stopwatches yet.<br>Tap "Add New" to start tracking.
        </div>
        
        <!-- Total Bar -->
        <div class="total-bar">
            <div class="total-label">Total Time</div>
            <div class="total-time" id="totalDisplay">00:00:00</div>
        </div>
        
    </div>

    <script>
        let stopwatches = [];
        let activeId = null; // Which stopwatch is currently running
        let tickInterval = null;
        
        // Load saved data
        function loadData() {
            const saved = localStorage.getItem('zhian_stopwatches');
            if (saved) {
                stopwatches = JSON.parse(saved);
            }
            // No stopwatch is running on page load
            activeId = null;
        }
        
        // Save data
        function saveData() {
            localStorage.setItem('zhian_stopwatches', JSON.stringify(stopwatches));
        }
        
        // Generate unique ID
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }
        
        // Format time as HH:MM:SS
        function formatTime(totalSeconds) {
            const hrs = Math.floor(totalSeconds / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = Math.floor(totalSeconds % 60);
            return String(hrs).padStart(2, '0') + ':' + 
                   String(mins).padStart(2, '0') + ':' + 
                   String(secs).padStart(2, '0');
        }
        
        // Calculate total time
        function calculateTotal() {
            return stopwatches.reduce((sum, sw) => sum + sw.seconds, 0);
        }
        
        // Update total display
        function updateTotal() {
            document.getElementById('totalDisplay').textContent = formatTime(calculateTotal());
        }
        
        // Start ticking
        function startTicking() {
            if (tickInterval) return;
            tickInterval = setInterval(() => {
                if (activeId) {
                    const sw = stopwatches.find(s => s.id === activeId);
                    if (sw) {
                        sw.seconds++;
                        saveData();
                        updateAllDisplays();
                        updateTotal();
                    }
                }
            }, 1000);
        }
        
        // Stop ticking if nothing is active
        function stopTickingIfNeeded() {
            if (!activeId && tickInterval) {
                clearInterval(tickInterval);
                tickInterval = null;
            }
        }
        
        // Add new stopwatch
        function addStopwatch(name = '') {
            // Pause any running stopwatch
            activeId = null;
            stopTickingIfNeeded();
            
            const newSw = {
                id: generateId(),
                name: name || 'New Activity',
                seconds: 0
            };
            stopwatches.push(newSw);
            saveData();
            renderAll();
            updateTotal();
        }
        
        // Delete stopwatch
        function deleteStopwatch(id) {
            if (activeId === id) {
                activeId = null;
                stopTickingIfNeeded();
            }
            stopwatches = stopwatches.filter(sw => sw.id !== id);
            saveData();
            renderAll();
            updateTotal();
        }
        
        // Start a stopwatch
        function startStopwatch(id) {
            // Pause the currently running one if different
            activeId = id;
            startTicking();
            renderAll();
        }
        
        // Pause a stopwatch
        function pauseStopwatch(id) {
            if (activeId === id) {
                activeId = null;
                stopTickingIfNeeded();
                renderAll();
            }
        }
        
        // Reset a stopwatch
        function resetStopwatch(id) {
            if (activeId === id) {
                activeId = null;
                stopTickingIfNeeded();
            }
            const sw = stopwatches.find(s => s.id === id);
            if (sw) {
                sw.seconds = 0;
                saveData();
                renderAll();
                updateTotal();
            }
        }
        
        // Update name
        function updateName(id, newName) {
            const sw = stopwatches.find(s => s.id === id);
            if (sw) {
                sw.name = newName || 'Unnamed';
                saveData();
            }
        }
        
        // Update all time displays
        function updateAllDisplays() {
            stopwatches.forEach(sw => {
                const display = document.getElementById('time-' + sw.id);
                if (display) {
                    display.textContent = formatTime(sw.seconds);
                }
            });
        }
        
        // Render all stopwatches
        function renderAll() {
            const list = document.getElementById('stopwatchList');
            const emptyState = document.getElementById('emptyState');
            
            if (stopwatches.length === 0) {
                list.innerHTML = '';
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                list.innerHTML = stopwatches.map(sw => {
                    const isRunning = sw.id === activeId;
                    return `
                        <div class="stopwatch-card ${isRunning ? 'running' : ''}" id="card-${sw.id}">
                            <div class="stopwatch-header">
                                <input 
                                    class="stopwatch-name" 
                                    value="${escapeHtml(sw.name)}" 
                                    placeholder="Activity name"
                                    onchange="updateName('${sw.id}', this.value)"
                                    onblur="updateName('${sw.id}', this.value)"
                                >
                                <button class="delete-btn" onclick="deleteStopwatch('${sw.id}')" title="Delete">🗑️</button>
                            </div>
                            <div class="time-display" id="time-${sw.id}">${formatTime(sw.seconds)}</div>
                            <div class="controls">
                                ${!isRunning ? 
                                    `<button class="ctrl-btn btn-start" onclick="startStopwatch('${sw.id}')">▶ Start</button>` :
                                    `<button class="ctrl-btn btn-pause" onclick="pauseStopwatch('${sw.id}')">⏸ Pause</button>`
                                }
                                <button class="ctrl-btn btn-reset" onclick="resetStopwatch('${sw.id}')">↺ Reset</button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            updateTotal();
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        // Initialize
        loadData();
        renderAll();
        updateTotal();
    </script>

</body>
</html>
